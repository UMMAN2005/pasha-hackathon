description = "Analyze local git history to extract coding patterns and generate SKILL.md files. Local version of the Skill Creator GitHub App."
prompt = "# /skill-create - Local Skill Generation\n\nAnalyze your repository's git history to extract coding patterns and generate SKILL.md files that teach Claude your team's practices.\n\n## Usage\n\n```bash\n/skill-create                    # Analyze current repo\n/skill-create --commits 100      # Analyze last 100 commits\n/skill-create --output ./skills  # Custom output directory\n/skill-create --instincts        # Also generate instincts for continuous-learning-v2\n```\n\n## What It Does\n\n1. **Parses Git History** - Analyzes commits, file changes, and patterns\n2. **Detects Patterns** - Identifies recurring workflows and conventions\n3. **Generates SKILL.md** - Creates valid Claude Code skill files\n4. **Optionally Creates Instincts** - For the continuous-learning-v2 system\n\n## Analysis Steps\n\n### Step 1: Gather Git Data\n\n```bash\n# Get recent commits with file changes\ngit log --oneline -n ${COMMITS:-200} --name-only --pretty=format:\"%H|%s|%ad\" --date=short\n\n# Get commit frequency by file\ngit log --oneline -n 200 --name-only | grep -v \"^$\" | grep -v \"^[a-f0-9]\" | sort | uniq -c | sort -rn | head -20\n\n# Get commit message patterns\ngit log --oneline -n 200 | cut -d' ' -f2- | head -50\n```\n\n### Step 2: Detect Patterns\n\nLook for these pattern types:\n\n| Pattern | Detection Method |\n|---------|-----------------|\n| **Commit conventions** | Regex on commit messages (feat:, fix:, chore:) |\n| **File co-changes** | Files that always change together |\n| **Workflow sequences** | Repeated file change patterns |\n| **Architecture** | Folder structure and naming conventions |\n| **Testing patterns** | Test file locations, naming, coverage |\n\n### Step 3: Generate SKILL.md\n\nOutput format:\n\n```markdown\n---\nname: {repo-name}-patterns\ndescription: Coding patterns extracted from {repo-name}\nversion: 1.0.0\nsource: local-git-analysis\nanalyzed_commits: {count}\n---\n\n# {Repo Name} Patterns\n\n## Commit Conventions\n{detected commit message patterns}\n\n## Code Architecture\n{detected folder structure and organization}\n\n## Workflows\n{detected repeating file change patterns}\n\n## Testing Patterns\n{detected test conventions}\n```\n\n### Step 4: Generate Instincts (if --instincts)\n\nFor continuous-learning-v2 integration:\n\n```yaml\n---\nid: {repo}-commit-convention\ntrigger: \"when writing a commit message\"\nconfidence: 0.8\ndomain: git\nsource: local-repo-analysis\n---\n\n# Use Conventional Commits\n\n## Action\nPrefix commits with: feat:, fix:, chore:, docs:, test:, refactor:\n\n## Evidence\n- Analyzed {n} commits\n- {percentage}% follow conventional commit format\n```\n\n## Example Output\n\nRunning `/skill-create` on a TypeScript project might produce:\n\n```markdown\n---\nname: my-app-patterns\ndescription: Coding patterns from my-app repository\nversion: 1.0.0\nsource: local-git-analysis\nanalyzed_commits: 150\n---\n\n# My App Patterns\n\n## Commit Conventions\n\nThis project uses **conventional commits**:\n- `feat:` - New features\n- `fix:` - Bug fixes\n- `chore:` - Maintenance tasks\n- `docs:` - Documentation updates\n\n## Code Architecture\n\n```\nsrc/\n├── components/     # React components (PascalCase.tsx)\n├── hooks/          # Custom hooks (use*.ts)\n├── utils/          # Utility functions\n├── types/          # TypeScript type definitions\n└── services/       # API and external services\n```\n\n## Workflows\n\n### Adding a New Component\n1. Create `src/components/ComponentName.tsx`\n2. Add tests in `src/components/__tests__/ComponentName.test.tsx`\n3. Export from `src/components/index.ts`\n\n### Database Migration\n1. Modify `src/db/schema.ts`\n2. Run `pnpm db:generate`\n3. Run `pnpm db:migrate`\n\n## Testing Patterns\n\n- Test files: `__tests__/` directories or `.test.ts` suffix\n- Coverage target: 80%+\n- Framework: Vitest\n```\n\n## GitHub App Integration\n\nFor advanced features (10k+ commits, team sharing, auto-PRs), use the [Skill Creator GitHub App](https://github.com/apps/skill-creator):\n\n- Install: [github.com/apps/skill-creator](https://github.com/apps/skill-creator)\n- Comment `/skill-creator analyze` on any issue\n- Receives PR with generated skills\n\n## Related Commands\n\n- `/instinct-import` - Import generated instincts\n- `/instinct-status` - View learned instincts\n- `/evolve` - Cluster instincts into skills/agents\n\n---\n\n*Part of [Everything Claude Code](https://github.com/affaan-m/everything-claude-code)*"
