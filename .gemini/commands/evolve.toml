description = "Analyze instincts and suggest or generate evolved structures"
prompt = "# Evolve Command\n\n## Implementation\n\nRun the instinct CLI using the plugin root path:\n\n```bash\npython3 \"${CLAUDE_PLUGIN_ROOT}/skills/continuous-learning-v2/scripts/instinct-cli.py\" evolve [--generate]\n```\n\nOr if `CLAUDE_PLUGIN_ROOT` is not set (manual installation):\n\n```bash\npython3 ~/.claude/skills/continuous-learning-v2/scripts/instinct-cli.py evolve [--generate]\n```\n\nAnalyzes instincts and clusters related ones into higher-level structures:\n- **Commands**: When instincts describe user-invoked actions\n- **Skills**: When instincts describe auto-triggered behaviors\n- **Agents**: When instincts describe complex, multi-step processes\n\n## Usage\n\n```\n/evolve                    # Analyze all instincts and suggest evolutions\n/evolve --generate         # Also generate files under evolved/{skills,commands,agents}\n```\n\n## Evolution Rules\n\n### → Command (User-Invoked)\nWhen instincts describe actions a user would explicitly request:\n- Multiple instincts about \"when user asks to...\"\n- Instincts with triggers like \"when creating a new X\"\n- Instincts that follow a repeatable sequence\n\nExample:\n- `new-table-step1`: \"when adding a database table, create migration\"\n- `new-table-step2`: \"when adding a database table, update schema\"\n- `new-table-step3`: \"when adding a database table, regenerate types\"\n\n→ Creates: **new-table** command\n\n### → Skill (Auto-Triggered)\nWhen instincts describe behaviors that should happen automatically:\n- Pattern-matching triggers\n- Error handling responses\n- Code style enforcement\n\nExample:\n- `prefer-functional`: \"when writing functions, prefer functional style\"\n- `use-immutable`: \"when modifying state, use immutable patterns\"\n- `avoid-classes`: \"when designing modules, avoid class-based design\"\n\n→ Creates: `functional-patterns` skill\n\n### → Agent (Needs Depth/Isolation)\nWhen instincts describe complex, multi-step processes that benefit from isolation:\n- Debugging workflows\n- Refactoring sequences\n- Research tasks\n\nExample:\n- `debug-step1`: \"when debugging, first check logs\"\n- `debug-step2`: \"when debugging, isolate the failing component\"\n- `debug-step3`: \"when debugging, create minimal reproduction\"\n- `debug-step4`: \"when debugging, verify fix with test\"\n\n→ Creates: **debugger** agent\n\n## What to Do\n\n1. Detect current project context\n2. Read project + global instincts (project takes precedence on ID conflicts)\n3. Group instincts by trigger/domain patterns\n4. Identify:\n   - Skill candidates (trigger clusters with 2+ instincts)\n   - Command candidates (high-confidence workflow instincts)\n   - Agent candidates (larger, high-confidence clusters)\n5. Show promotion candidates (project -> global) when applicable\n6. If `--generate` is passed, write files to:\n   - Project scope: `~/.claude/homunculus/projects/<project-id>/evolved/`\n   - Global fallback: `~/.claude/homunculus/evolved/`\n\n## Output Format\n\n```\n============================================================\n  EVOLVE ANALYSIS - 12 instincts\n  Project: my-app (a1b2c3d4e5f6)\n  Project-scoped: 8 | Global: 4\n============================================================\n\nHigh confidence instincts (>=80%): 5\n\n## SKILL CANDIDATES\n1. Cluster: \"adding tests\"\n   Instincts: 3\n   Avg confidence: 82%\n   Domains: testing\n   Scopes: project\n\n## COMMAND CANDIDATES (2)\n  /adding-tests\n    From: test-first-workflow [project]\n    Confidence: 84%\n\n## AGENT CANDIDATES (1)\n  adding-tests-agent\n    Covers 3 instincts\n    Avg confidence: 82%\n```\n\n## Flags\n\n- `--generate`: Generate evolved files in addition to analysis output\n\n## Generated File Format\n\n### Command\n```markdown\n---\nname: new-table\ndescription: Create a new database table with migration, schema update, and type generation\ncommand: /new-table\nevolved_from:\n  - new-table-migration\n  - update-schema\n  - regenerate-types\n---\n\n# New Table Command\n\n[Generated content based on clustered instincts]\n\n## Steps\n1. ...\n2. ...\n```\n\n### Skill\n```markdown\n---\nname: functional-patterns\ndescription: Enforce functional programming patterns\nevolved_from:\n  - prefer-functional\n  - use-immutable\n  - avoid-classes\n---\n\n# Functional Patterns Skill\n\n[Generated content based on clustered instincts]\n```\n\n### Agent\n```markdown\n---\nname: debugger\ndescription: Systematic debugging agent\nmodel: sonnet\nevolved_from:\n  - debug-check-logs\n  - debug-isolate\n  - debug-reproduce\n---\n\n# Debugger Agent\n\n[Generated content based on clustered instincts]\n```"
