description = "Fix Go build errors, go vet warnings, and linter issues incrementally. Invokes the go-build-resolver agent for minimal, surgical fixes."
prompt = "# Go Build and Fix\n\nThis command invokes the **go-build-resolver** agent to incrementally fix Go build errors with minimal changes.\n\n## What This Command Does\n\n1. **Run Diagnostics**: Execute `go build`, `go vet`, `staticcheck`\n2. **Parse Errors**: Group by file and sort by severity\n3. **Fix Incrementally**: One error at a time\n4. **Verify Each Fix**: Re-run build after each change\n5. **Report Summary**: Show what was fixed and what remains\n\n## When to Use\n\nUse `/go-build` when:\n- `go build ./...` fails with errors\n- `go vet ./...` reports issues\n- `golangci-lint run` shows warnings\n- Module dependencies are broken\n- After pulling changes that break the build\n\n## Diagnostic Commands Run\n\n```bash\n# Primary build check\ngo build ./...\n\n# Static analysis\ngo vet ./...\n\n# Extended linting (if available)\nstaticcheck ./...\ngolangci-lint run\n\n# Module issues\ngo mod verify\ngo mod tidy -v\n```\n\n## Example Session\n\n```text\nUser: /go-build\n\nAgent:\n# Go Build Resolution\n\n## Initial Diagnostics\n\n```bash\n$ go build ./...\ninternal/service/user.go:25:15: undefined: UserRepository\ninternal/handler/api.go:42:9: cannot use x (type string) as type int\ninternal/handler/api.go:58:2: missing return at end of function\n```\n\nErrors found: 3\n\n## Fix 1: Undefined Identifier\n\nFile: internal/service/user.go:25\nError: undefined: UserRepository\nCause: Missing import\n\n```go\n// Added import\nimport \"project/internal/repository\"\n\n// Changed\nvar repo UserRepository\n// To\nvar repo repository.UserRepository\n```\n\n```bash\n$ go build ./...\n# 2 errors remaining\n```\n\n## Fix 2: Type Mismatch\n\nFile: internal/handler/api.go:42\nError: cannot use x (type string) as type int\n\n```go\n// Changed\ncount := params.Get(\"count\")\n// To\ncountStr := params.Get(\"count\")\ncount, _ := strconv.Atoi(countStr)\n```\n\n```bash\n$ go build ./...\n# 1 error remaining\n```\n\n## Fix 3: Missing Return\n\nFile: internal/handler/api.go:58\nError: missing return at end of function\n\n```go\nfunc GetUser(id string) (*User, error) {\n    if id == \"\" {\n        return nil, ErrInvalidID\n    }\n    user := findUser(id)\n    // Added missing return\n    return user, nil\n}\n```\n\n```bash\n$ go build ./...\n# Build successful!\n```\n\n## Final Verification\n\n```bash\n$ go vet ./...\n# No issues\n\n$ go test ./...\nok      project/internal/service   0.015s\nok      project/internal/handler   0.023s\n```\n\n## Summary\n\n| Metric | Count |\n|--------|-------|\n| Build errors fixed | 3 |\n| Vet warnings fixed | 0 |\n| Files modified | 2 |\n| Remaining issues | 0 |\n\nBuild Status: PASS: SUCCESS\n```\n\n## Common Errors Fixed\n\n| Error | Typical Fix |\n|-------|-------------|\n| `undefined: X` | Add import or fix typo |\n| `cannot use X as Y` | Type conversion or fix assignment |\n| `missing return` | Add return statement |\n| `X does not implement Y` | Add missing method |\n| `import cycle` | Restructure packages |\n| `declared but not used` | Remove or use variable |\n| `cannot find package` | `go get` or `go mod tidy` |\n\n## Fix Strategy\n\n1. **Build errors first** - Code must compile\n2. **Vet warnings second** - Fix suspicious constructs\n3. **Lint warnings third** - Style and best practices\n4. **One fix at a time** - Verify each change\n5. **Minimal changes** - Don't refactor, just fix\n\n## Stop Conditions\n\nThe agent will stop and report if:\n- Same error persists after 3 attempts\n- Fix introduces more errors\n- Requires architectural changes\n- Missing external dependencies\n\n## Related Commands\n\n- `/go-test` - Run tests after build succeeds\n- `/go-review` - Review code quality\n- `verification-loop` skill - Full verification loop\n\n## Related\n\n- Agent: `agents/go-build-resolver.md`\n- Skill: `skills/golang-patterns/`"
